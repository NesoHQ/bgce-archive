name: Manual Build and Push - Cortex

on:
    workflow_dispatch:
        inputs:
            image-tag:
                description: "Docker image tag"
                required: false
                type: string
                default: "latest"

env:
    SERVICE_NAME: cortex

jobs:
    build-and-push:
        permissions:
            contents: read
            packages: write
        uses: ./.github/workflows/docker-build.yml
        with:
            service: cortex
            should-build: true
        secrets: inherit
